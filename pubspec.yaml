name: flock_flutter
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  carousel_slider: ^5.1.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  graphql_flutter: ^5.2.0
  flutter_svg: ^2.2.0
  intl: ^0.20.2
  iconify_flutter: ^0.0.7
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.5.0
  build_runner: ^2.6.0

flutter:
  uses-material-design: true
  fonts:
    - family: FlockFont
      fonts:
        - asset: assets/fonts/Galada-Regular.ttf
  assets:
    - assets/icons/
